networks:
  agora-network:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
  chroma_data:
  redis_data:

services:
  # ── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - agora-network
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    networks:
      - agora-network
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  chromadb:
    image: chromadb/chroma:latest
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - agora-network
    ports:
      # Port hôte 8888 → port interne 8000 (ChromaDB écoute sur 8000 par défaut).
      # Les services applicatifs se connectent à chromadb:8000 dans le réseau Docker.
      - "8888:8000"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    networks:
      - agora-network
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ── Application services ─────────────────────────────────────────────────────

  gateway:
    build:
      context: ./services/gateway
    environment:
      AUTH_SERVICE_URL: http://auth:8000
      BOARDS_SERVICE_URL: http://boards:8000
      CONTENT_SERVICE_URL: http://content:8000
      SEARCH_SERVICE_URL: http://search:8000
      DISCOVERY_SERVICE_URL: http://discovery:8000
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
    networks:
      - agora-network
    ports:
      - "8000:8000"
    depends_on:
      - auth
      - boards
      - content
      - search
      - discovery

  auth:
    build:
      context: ./services/auth
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      JWT_EXPIRE_DAYS: ${JWT_EXPIRE_DAYS}
    networks:
      - agora-network
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy

  boards:
    build:
      context: ./services/boards
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
    networks:
      - agora-network
    ports:
      - "8002:8000"
    depends_on:
      postgres:
        condition: service_healthy

  content:
    build:
      context: ./services/content
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
    networks:
      - agora-network
    ports:
      - "8003:8000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy

  ingestion:
    build:
      context: ./services/ingestion
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: ${REDIS_URL}
      CHROMA_HOST: ${CHROMA_HOST}
      CHROMA_PORT: ${CHROMA_PORT}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
    networks:
      - agora-network
    ports:
      - "8004:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_started

  search:
    build:
      context: ./services/search
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      CHROMA_HOST: ${CHROMA_HOST}
      CHROMA_PORT: ${CHROMA_PORT}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
    networks:
      - agora-network
    ports:
      - "8005:8000"
    depends_on:
      chromadb:
        condition: service_started

  discovery:
    build:
      context: ./services/discovery
    environment:
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
    networks:
      - agora-network
    ports:
      - "8006:8000"

  frontend:
    build:
      context: ./frontend
    networks:
      - agora-network
    ports:
      - "3000:3000"
    depends_on:
      - gateway
